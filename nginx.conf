worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # CSP: self-only scripts, inline styles allowed for Vue/PrimeVue runtime,
        # connect to the GoatCounter beacon only. No third-party scripts, no
        # framing. Tightens "trust the LAN" mindset down to the web layer.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://stats.battistella.ovh; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # SPA HTML must always revalidate: Vite hashes asset names per build,
        # so a stale index.html (or pre-rendered per-route HTML) pins the
        # browser to old chunk URLs that no longer exist after a deploy.
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # Data files (JSON articles)
        location /data {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # robots.txt and sitemap.xml — short cache, must-revalidate
        location = /robots.txt {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }
        location = /sitemap.xml {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # SPA routing - prefer the pre-rendered per-route HTML
        # (e.g. /posts/<slug>/index.html, /en/posts/<slug>/index.html) emitted
        # by scripts/generate-og.mjs. Fall back to the SPA shell for routes
        # without a pre-rendered file.
        location / {
            try_files $uri $uri/index.html $uri/ /index.html;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # Disable access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
